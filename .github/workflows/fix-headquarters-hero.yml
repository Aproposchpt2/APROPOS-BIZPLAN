name: One-time headquarters hero fix

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fix-headquarters-hero.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply headquarters image and hero CSS
        run: |
          set -euo pipefail
          curl -fL "https://raw.githubusercontent.com/Aproposchpt2/CapGen-Govt-Search--Engine/main/headquarters.webp" -o headquarters.webp
          python3 - <<'PY'
          from pathlib import Path
          import re

          INDEX = Path('index.html')
          STYLES = Path('styles.css')
          IMAGE_URL = "url('/headquarters.webp')"
          CAPGEN_BG = "linear-gradient(100deg,rgba(7,15,34,.9) 0%,rgba(11,28,72,.64) 40%,rgba(15,42,106,.24) 68%,rgba(15,42,106,.06) 100%),linear-gradient(to bottom,transparent 84%,rgba(5,10,23,.28)),url('/headquarters.webp')"

          def replace_hero_bg_image(text):
              """Replace only the image URL inside an existing .hero background-image rule."""
              changed = {'value': False}

              def block_repl(match):
                  block = match.group(0)
                  if 'background-image' not in block:
                      return block
                  new_block = re.sub(
                      r"(background-image\s*:\s*(?:.*?,\s*)*)url\((?:'[^']*'|\"[^\"]*\"|[^)]*)\)",
                      r"\1" + IMAGE_URL,
                      block,
                      count=1,
                      flags=re.S,
                  )
                  if new_block != block:
                      changed['value'] = True
                  return new_block

              updated = re.sub(r"\.hero\s*\{[^{}]*\}", block_repl, text, count=1, flags=re.S)
              return updated, changed['value']

          index_text = INDEX.read_text(encoding='utf-8')
          updated_index, changed_index = replace_hero_bg_image(index_text)

          if changed_index:
              INDEX.write_text(updated_index, encoding='utf-8')
          else:
              styles_text = STYLES.read_text(encoding='utf-8') if STYLES.exists() else ''
              updated_styles, changed_styles = replace_hero_bg_image(styles_text)
              if changed_styles:
                  STYLES.write_text(updated_styles, encoding='utf-8')
              elif IMAGE_URL not in index_text:
                  override = (
                      "\n/* Hero headquarters background — CapGen family image */\n"
                      ".hero{background-image:" + CAPGEN_BG + ";background-size:cover;background-position:center bottom;background-repeat:no-repeat;}\n"
                      ".hero h1,.hero .lede{color:#fff;text-shadow:0 2px 34px rgba(0,8,24,.45)}\n"
                      ".hero .eyebrow{color:#fff;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.24)}\n"
                      ".hero .tagline-band{color:#C9A84C;background:rgba(15,42,106,.72);border-color:rgba(201,168,76,.45)}\n"
                  )
                  if '</style>' in index_text:
                      index_text = index_text.replace('</style>', override + '</style>', 1)
                  else:
                      index_text = index_text.replace('</head>', '<style>' + override + '</style>\n</head>', 1)
                  INDEX.write_text(index_text, encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: rm -f .github/workflows/fix-headquarters-hero.yml

      - name: Commit fix
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add headquarters.webp index.html styles.css .github/workflows/fix-headquarters-hero.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Fix: hero image — headquarters.webp from CapGen applied to Nevada Enterprise homepage"
          git push
